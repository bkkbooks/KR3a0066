body:
  text: 準齋雜説卷下宋吳如愚撰忍説忍之字一也而有二義焉有不仁之忍有能容之忍孟子曰先王有不忍人之心斯有不忍人之政是以不忍為仁也齊宣不忍牛之觳觫孟子以為仁術夫既以不忍為仁則忍為不仁也明矣故知孔子謂季氏八佾舞於庭先以是可忍也為言者蓋明季氏之不仁也八佾天子之舞而季氏不仁之心且忍于僭則推是心以往何所不至所以繼之曰孰不可忍也抑明季氏之不仁將不止乎此矣是所謂不仁之忍也乃若書曰必有忍其乃有濟下文繼言有容德乃大是所謂能容之忍也惟其忍可以濟事故孔子亦言小不忍則亂大謀蓋謂小不能容忍則大謀不可成此忍之一字所以義有不同也由其字同而義異故主仁術言之不忍為善而忍乃為不善主容德言之能忍為善而不忍為不善二説雖若相反而義則在于兼明蓋存心貴有所不忍而忍則非惻隱之端臨事貴能有所忍而不忍則無含宏之量此忍之在人所以貴乎兩盡其義也求之于古能兩盡其義者其周之太王乎當其居邠狄人侵之事之以皮幣事之以犬馬事之以珠玉亦可謂能忍矣至其不免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人是即不忍人之心也夫惟有不忍人之心而又能臨事而忍此所以邠人稱之為仁人從之者如歸市卒至八百年之基業由是而成焉噫忍之為義關係於人也其大如此然則後世之士有志於事功者其于存心臨事之間可不知所以用其力乎雖然存心固不可有不仁之忍臨事固不可無能容之忍又當顧性稟而加之以學力則義斯兩盡性之所稟者柔則用力于忍也為易性之所稟者剛則用力于忍也為難顔子稟性柔而益之以學力故能其心三月不違仁終至於犯而不校子路稟性剛雖益之以學力終不能無愠見之色行行之氣是又學者不可不知者也知此而用力焉其于忍也何患乎不能兩盡其義哉義至于兩盡則終歸于一道何以言之蓋存心無不仁之忍者其心必恕臨事有能容之忍者其心亦恕是知恕者忍之良方也孔子曰一言而可以終身行之者其恕乎學者不用力于忍則已茍用力于忍請以是思之術説人不可以亡術人而亡術則是為不學之人後世學者多言術非聖門之所尚殊不知術之名一也而義則有二焉有法術之術術之可為法者也有技術之術術之見于技者也鄉飲酒義曰古之學術道者將以得身也是故聖人務焉王制曰樂正崇四術立四教順先王詩書禮樂以造士此法術之見于禮記者也孟子治儒術之道所治者正此道術而謂聖門不以術為尚可乎蓋自秦人焚滅經術而術之可為法者遂致湮微漢世之君不知有帝王之術而或惟方術是好由是技術興焉技術既興而術之名斯不美矣則亦宜乎後之學者於術無所取也然嘗即孟子言術者參之曰是乃仁術曰觀水有術曰教亦多術無非明法術之意惟其術有不同故孟子又有術不可不謹之言而荀子亦有論心不如擇術之語是知術之在人固不容無所患者擇之不謹而術非其術則非徒無益而又害之繫辭載藉用白茅無咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣由此觀之則知聖人未嘗不以術教人學者誠能謹斯術而至于無所失則又何術之嫌哉節説事有節則得其宜物有節則當于用故節有亨通之義所以易于節卦首言節亨不節則有嗟苦之象失于不及也苦節則有道窮之象失于過之也是知節以得中為貴節而得中則斯合于禮而盡節之道蓋節者以禮為本以中為則故也有子曰知和而和不以禮節之亦不可行也孟子曰禮之實節文斯二者是也即語孟之言參之則知節以禮為本明矣節之所以本乎禮者由禮乃天然之則所以制中必中乎禮斯能中節此中所以為節之則也惟其禮者節之本中者節之則故樂記有言大禮與天地同節而節之彖亦云天地節而四時成陽盛則節之以隂寒極則節之以暑二氣必得其中四時斯不失序天地且爾而况于人乎此人之所以不可不知節也節之為義豈但曰節財用而已哉自其內而言之則嗜欲不可不節嗜欲不節則清明之氣昏矣自其外而言之則飲食不可不節飲食不節則和平之氣乖矣知此而節則中正以通不惟無飲酒濡首之患而于安節之亨甘節之吉亦能有所得矣是乃節之旨要即書中所謂節性之旨也學聖人者必明節之旨以盡節之道斯無愧矣三畏説人有三畏而仕宦者尤當畏之一畏滿二畏炎三畏極滿係乎心炎係乎時極係乎分心髙而傲滿也時發而驟炎也分足而止極也三者皆不可久之兆此其所以可畏也人之于此知滿之可畏則當處之以謙毋驕縱可也知炎之可畏則當處之以遁毋躁進可也知極之可畏則當處之以節毋過求可也茍為不然當畏不畏滿則必溢炎則必焚極則必變其可久乎觀者戒之四力説人之仕宦宜具四力一曰學力二曰才力三曰精力四曰福力學力關于心志才力關于質稟精力關于氣體福力關于命分于其四力之中學力可以必其至福力不可以必其全何者學力本乎人福力本乎天也乃若才力精力則在乎可必之間蓋于學力福力或相因而消長焉世固有無才力無精力而因學力之充福力之厚或能勉強而成事者亦有有才力有精力而因學力之不充福力之不厚或至衰微而敗事者是知四力之在人雖均不可無而學力與福力尤仕者之所不可無也有學力無福力則雖有才力精力可以任事終不容施設于時有福力無學力則雖有才力精力可以立事終不能輝光於世此學力與福力所以貴乎兼備而不可以偏廢也雖然才力精力兼之者蓋亦有之學力福力兼之者實不多見二者固不可以偏廢然以理而推之孰為最急曰學力修于己福力得于天盡其修于己者以順其在天者可也恃其得于天者以忘其在己者不可也當知福力有限學力無窮然則仕宦于世者其于福力之有限固不可越分而過求而于學力之無窮可不益思所以勉之哉五纍説一曰聲色之纍在人有輕重之不同貧賤者疾病者衰老者欲雖存而力不逮故其纍為輕富貴者康寧者少壯者力有餘而欲易縱故其纍為重此纍不除則淫佚斯生而清明之氣昏矣二曰貨利之纍則非聲色之比矣無分乎貧賤富貴無間乎疾病康寧無拘乎衰老少壯人人有不足之心故其為纍無分乎輕重此纍不除則鄙吝斯萌而得失之心重矣三曰功名之纍則又不然聲色貨利之纍愚者不肖者常多智者賢者常少功名之纍智者賢者常多愚者不肖者常少何以言之功名之志惟智惟賢可以有立而功名之事非在位在職則不可以有成是知功名之與官爵常相資者也相資得其道何纍之有相資失其道斯為纍矣其所以為纍者以其有功名之念而後有官爵之念為此身之纍世之士大夫不為官爵之纍者幾何人哉此身既為官爵纍謂非功名之纍可乎此纍不除則奔競斯甚而去就之義乖矣四曰子孫之纍較之功名抑又甚焉功名之於人猶有智愚賢不肖之分至於子孫則無智無愚無賢無不肖孰無鍾愛之念資財可積貪求不厭為子孫也官爵可慕覬幸不已為子孫也生猶可也甚至眷戀牽纒不能割愛於啓手足之時當知所以為纍者由平時不克念之故非子孫之纍人之自纍之耳此纍不除則愛戀斯深而死生之際亂矣五曰知見之纍自非聖人不能免也上焉者生而知之雖有所知見而知見無所纍於心斯謂上知也下焉者困而不學雖無所知見而此心以不明為纍所謂下愚也處上智下愚之間困而學之者常患乎知見之不能廣學而知之者又患乎知見之不能忘故知見之纍在中人為尤甚不識不知順帝之則惟堯帝文王為然也吾有知乎哉無知也惟吾夫子為然也學如顔子具體而微其餘知見猶不能無有不善未嘗不知知之未嘗復行此顔子之知也瞻之在前忽焉在後此顔子之見也然而有若無實若虛得非欲去其纍乎忘仁義忘禮樂以至于坐忘則顔子之知見亦可謂無纍矣而夫子稱之猶曰回也其庶乎屢空謂之庶乎屢空則其知見是猶有時而未盡去也顔子且爾而况不如顔子者乎無知見而不能學有知見而不能化皆纍也所以繫辭論德之盛必曰窮神知化而孟子論聖與神亦曰大而化之之謂聖聖而不可知之之謂神是知知見之在人其始也不可委于無其終也不可泥於有此纍不除則聰眀斯蔽而精微之理晦矣五纍在人均為纍也而所以為纍者不同焉有有形之纍有無形之纍如聲色之與貨利功名之與子孫此有形之纍也皆係乎身乃若知見之纍比之四者則無形之可見惟係乎心係乎身者其纍顯以其在外也係乎心者其纍隱以其在內也在外之纍非忘物之至不能渙然而氷釋在內之纍非忘我之至不能怡然而理順故欲物之忘則必踐履之純熟欲我之忘則必涵養之精明二者之功內外相濟至於物我之兩忘則五纍斯可去矣五纍俱去聖人也知見雖未去而餘無纍者賢人也自知見而下有能去其一二者亦不失為善類也然則有志於學者可不知所用功哉知幾説甚矣人之不可以不知幾也幾者動之微人惟知幾則於微無忽於動斯謹所謂吉之先見者也孔子因易有介如石不終日貞吉之辭故於繫辭明君子見幾而作不俟終日之旨蓋言君子之於幾其見之也明其為之也勇所以無失幾之悔也今觀衛靈公問陳齊景公有不能用之言季桓子受女樂而不朝孔子未嘗不行聖人見幾而作蓋如此乃若顔子有不善未嘗不知知之未嘗復行孔子以其庶幾稱之此賢人之知幾者也後之學者視孔子之見幾顔子之庶幾固不易及但于去就之間能知所謹亦可矣茍惟眇綿莫察知進而不知退乖其去就之義欲無愧於聖訓不亦難乎懲忿窒欲説人必知學則必能懲忿窒欲忿必懲欲必窒則心清矣心清則神清神清則氣清氣清則其為人也生為善類逮其死也化於清氣之中亦為善類隨清氣之厚薄分其善類之髙下人不知學則不能懲忿窒欲忿不懲欲不窒則心不清矣心不清則神濁神濁則氣濁氣濁則其為人也生為惡類逮其死也化於濁氣之中亦為惡類隨其濁氣之厚薄分其惡類之髙下此人之所以不可不學歟此學之所以不可不明歟形影説凡物有身必有影此有形之影也人皆得而識之若夫無形之影識之者實鮮非學力之至烏能識之哉中庸曰誠則形形則著是之所謂形者乃無形之形也夫既有如是之形則必有如是之影矣孔子曰立則見其參於前在輿則見其倚於衡顔淵曰瞻之在前忽焉在後此非無形之影而何試即夫物之有形者參之其為影也日明則見隂則不見月明則見晦則不見燈明則見暗則不見鏡明則見昏則不見所以見者明也其不見者不眀故也有形之影如此况無形乎人必此心之眀如日如月如燈如鏡則斯影也有昭然不可掩者矣影響説凡物有形必有影此有形之影也人皆得而見之有聲必有響此有聲之響也人皆得而聞之若夫無形之影可視以心而不可視以目無聲之響可聽以心而不可聽以耳非學問窮物理聰眀逹天德者烏得見而聞哉且以禮樂言之升降揖遜禮之有形者也而聖人之論禮乃以無體言豈非無形之形乎倡和清濁樂之有聲者也而聖人之論樂乃以無聲言豈非無聲之聲乎夫禮樂既有如是之形聲也而必有如是之影響乎曰有聖人之發明無體之禮則曰威儀遲遲施及四海是即無形之影也發明無聲之樂則曰氣志不違日聞四方是即無聲之響也形聲俱泯影響自存此禮樂所以為至也抑嘗即夫物之有形有聲者參之形存於此影雖微而必彰者無如日之明聲發于此響雖逺而必應者無如谷之虛日不明則影不彰谷不虛則響不應有形有聲者如此而况至于無形無聲者乎故人于此欲視于無形則開明此心當如皎日欲聽于無聲則虛豁此心當如空谷能盡是道非學問不能也孟子曰學問之道無他求其放心而已心在則視之無弗見而能見其所不見聽之無弗聞而能聞其所不聞所不見所不聞即無形無聲者也夫如是則視逺惟明聽德惟聰者斯兩盡之矣豈特目有見耳有聞而已哉人君嚮陽説北辰居中前離後坎左震右兊是亦向陽也聖人南面取諸離固嚮明而治也然離之所以明者以位虛而屬火故火無實體依木為用木于五常為仁而火實資之以生所以火氣為生氣當知人君所居以嚮陽為貴者不但取其明亦以陽為生氣故爾所以繫辭論天地之大德曰生必繼之以聖人之大寶曰位何以守位曰仁生與位並言而復以仁次之厥旨深矣是知人之一身有火氣則生無火氣則死心火未滅則神不去形蓋生氣猶存也故萬物好陽而惡隂所以然者好生而惡死故也如此則知陽之是嚮不特人君為然凡人皆貴于嚮之所以貴之者非専貴其明抑亦貴其生耳警世説仁莫仁於安宅暴莫暴於馮河惡莫惡於傲忽善莫善於謙和得莫得於知足失莫失於貪多易莫易於平正險莫險於偏頗怠莫怠於遊豫勤莫勤於切磋樂莫樂於擊壤苦莫苦於奔波吉莫吉於執御凶莫凶於操戈益莫益於浩養損莫損於酣歌逹莫逹於心悟窮莫窮於事磨省莫省於夢蝶迷莫迷於燈蛾自警説易其言者多悔忽其動者多憂輕貧重富天不汝祐驕奢淫佚有凶無吉疾人之善兮於彼何損幸人之惡兮於我何加勿以小善為無益而不為勿以小惡為無傷而不去天之髙明始於昭昭地之博厚本於撮土學不可廢廢學者難乎成人志不可滿志滿者殆將喪身欲不可縱縱欲者其如後患何過不可文文過者終無聞焉矣養生説莊子養生之説亦極有理不可以其荒唐而廢其言也鞭後之旨明之者鮮羊之居後者必貪食者也貪食則敗羣其可不鞭之哉將以養生者能以貪自懲則欲必寡矣寡欲者養生之良方也孟子曰養心莫善於寡欲而莊子以養生言養心養生雖異説而所以養之者則同所養雖同成功則異何以言之蓋莊子之養生所以養其身孟子之養心於以善天下身者人之所獨心者天下之所同此孟莊之學所以不同與勉學説學也者所以明性也博而非不若約而正速而名不若久而成思之也精求之也敏力行以勉之不倦以終之如斯則為學之要得矣為學之要得則道不難於日致蓋道之所要者虛也學之所要者實也虛則無所不容此道之所以大實則無所不充此學之所以益學惟有所益則德斯有所進德者充實於己者也進而不已則天德可達矣學而造於是則寂然安焉默然曉焉混然天成光輝燦然其樂有非言之所可得而形容者是故存于中中無所倚著于外外無所間反之于身則無物不備體之於物則無物不合發之于言則言可則見之于行則行可法此君子之學所以貴乎深造之以道也人而不學則下矣學而不正非徒無益而又害之人其可不學乎學其可不正乎勉學賦人具四體性均一天由或學與或否故有愚而有賢德欲昭明端在修身之謹理資講貫莫先用志之専蒙嘗息念簮纓究心弦誦時時不倦于時習日日常知于日用道惟可樂忘簞瓢陋巷之憂友必相親願車馬輕裘之共誠以命分素定塵生漫勞務道樞之謹守宜德柄之常操勢榮孰若義榮之顯人爵何如天爵之髙深念惜隂之過隙每懷繼晷以焚膏惟理義心所同然味猶熊掌惟富貴人所欲也視若鴻毛兹蓋無為其所不為于止而知所止絶去私欲復還正理視聽言動嚴遵四勿之戒意必固我默會四毋之旨物交物而物莫能奪心感心而心無所倚學以聚問以辨志在操存居之安資之深躬勤踐履一塵眯目物雖近而莫覩一事縈心理雖存而莫通欽厥止安汝止則何往而非止執厥中用其中則何行而匪中故此觀無體之禮兮敬以直內聽無聲之樂兮和而不同欲致有孚之益必全養正之蒙勉學詩老來幸安適滿懷春氣和顧我一心定從他雙鬢皤如天運日月若水息風波尚聽升堂樂寧操入室戈間吟意自得節飲顔微酡聖道有餘樂良朋不厭多金門既絶望鐵硯奚勞磨世事省夢蝶物情歎燈蛾反躬貴黽勉進步毋蹉跎蝸角漫成縛烏光快擲梭人如未知覺志須勤切磋或至自暴棄吾末如之何準銘則出于天用近于理旁行不流中立不倚積水成淵其平由止準所以平蓋取諸此以水喻心明準之旨委分萬殊源歸一揆可方可圓稱物而已毫釐靡差斯為準矣在仁如射發必正巳在義為的合宜為美在禮如衡罔乖所履在智如巧事須謹始以之正國為國有紀以之齊民納民於軌天地雖大彌綸以是四海雖逺放之自邇準於萬世大哉孔子願學為準是之取爾準齋序齋以準名何如其準也乾元用九乃見天則此準之在天者堯傳之舜舜傳之禹以至文武周公孔子不曰執中則曰用中不曰建極則曰立極無非準也大則彌綸天地逺則放諸四海余取之以名齋則知是齋也其天下之廣居耶操存有地積纍有基得是齋之門者不廢繩墨者也升是齋之堂者罔失法度者也入是齋之室者行中規還中矩者也居是齋者何為哉或起或處惟正是適或默或語惟平是持守之于仁則如射行之於義則為的禮猶衡則審輕重之權智猶巧則先條理之事惟直內方外有自然之則故舉斯加彼即同然之理夫如是則不獨準於一身又將準于萬民而同其歸不但準于萬民抑將準于萬物而平其施是必無所不用其極斯無愧于名齋之義也或者曰萬世之標準名齋得非以聖人自期乎余應曰夫聖孔子不居是何言也始為士終乎為聖人不學則已學則當以聖人為準矣顔淵曰舜何人也豫何人也有為者亦若是此以舜為準也孟子曰吾未能有行焉乃所願則學孔子也此以孔子為準也余之名是齋其志亦將以聖人為準所謂非曰能之願學焉以聖自期則吾豈敢或者憮然為間曰命之矣靜喻人生而靜是謂天性不動如山其明似鏡惟艮之止得蒙之正何事于仁堯舜猶病靜戒存心養性以事天必有事焉而勿正寂然不動靜斯安能靜自然能致敬須知靜敬本一源二者並行無異行靜中更用敬加功揠苖助長方為病靜訣靜處安靜動處習靜靜至寂無無往不敬四益針身有四益不可不志愛物親仁觀書省事四訓針家有四訓不可不佩敬上恕下周外和內四宜針時有四宜不可不審約言簡出謹文節飲
