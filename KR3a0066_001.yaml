body:
  text: 準齋雜説卷上宋吳如愚撰致知格物説致知者期造乎知之極地也致知之方不出於格物欲明格物之旨當明格字之訓格之為義不一或以為至書言歸格於藝祖之格是也或以為來書言格爾衆庶之格是也或以為法禮言言有物而行有格之格是也或以為感書言格于皇天之格是也或以為鬭史言手格猛獸之格是也凡是數義皆不可以訓此惟孟子言大人格君心之非以正為訓於義近之即所訓字詳其句義則可見矣若曰致知在至物物至而后知至不可也致知在來物物來而后知至亦不可也以至曰法曰感曰鬭逐句取義皆不可也惟有正字謂致知在正物物正而后知至其於句義誠通所以孟子論大人之格君終之以一正君而國定是以正訓格也然此不言正物而言格物者蓋欲學者於物交物之際用其力焉故謂之格物物格則正不格則不正孟子言耳目之官不思而蔽於物物交物則引之而已矣引之則大者不立而小者奪之此心無自而明安能致其知乎是知物交物而不為所引者是所謂格物者也且以目之於色耳之於聲言之目物也色亦物也以目視色物交物也目不為色所引則物格矣物格則所視者明不惟目正而色亦正耳物也聲亦物也以耳聽聲物交物也耳不為聲所引則物格矣物格則所聽者聰不惟耳正而聲亦正此所以不言正物而言格物格字所訓至於晉時其義尚明如稱陸抗不以名位格物猶有見於此也詩曰天生蒸民有物有則是之所謂物者在我者也在我者不容不交於物有則存焉目之視色耳之聽聲是也使目而不視耳而不聽則目自目色自色耳自耳聲自聲何格之有樂記曰感於物而動性之欲也是之所謂物者在外者也在外者不能不交於我其交於我也欲斯形焉若以在外之物皆為私欲一切絶去不惟百物皆廢而吾之一身亦無所施其用又何格之有是知所謂格物之物指兩物相交而言惟其引之則蔽所以貴乎格也樂記又曰物至知知然後好惡形焉於此而不知格則好惡無節於內知誘於外天理滅矣是焉得為知乎此致知所以在乎格物也易之艮止也彖明止義有曰上下敵應不相與也知上下敵應不相與之為止則知物交物而不為所引其為格物也明矣蓋不為物引則止即格物之義也所以大學推明止義為尤詳夫子告顔子以克己之目自非禮勿視至非禮勿動是亦誨之以知止之方也書言安汝止欽厥止無非格物之功用然則欲致其知者可不以格物為先務乎窮理格物説格物二字先儒以窮理言學者以窮理會但知今日窮一理明日窮一理而不知理若何而窮物若何而格知若何而可致哉當知物物有理是固然也然格字本不訓窮物字本不訓理而先儒乃以窮理説格物者豈非以理不窮則物不可格必窮物之理而後可以知之必知物之理而後可以格之與蓋嘗即大學之言而明之窮理一説謂可以格物於義固無礙也謂即為格物於義則不通焉今觀大學之論格物必先言物有本末事有終始知所先後則近道矣是即先窮理之旨也不先窮理則物之本末事之終始莫知其所先後何由近道道既不可近安能格物哉惟其先窮理而物斯可以格故知所先後之知當在格物之先是知雖在格物之先謂之知可也謂為知之至則未可也欲其知之至非致知不可致知者極其知之所至也欲極其知之所至捨格物何以哉此所以曰致知在格物也格字之義固嘗以曰至曰來曰法曰感曰鬭詳明其訓皆有不通惟書言格其非心以正為訓而孟子論大人格君心之非亦以正訓格故有取焉然不言正物而言格物者蓋物格則正不格則不正因取孟子所論耳目之官眀之謂物交物而不為所引是為格物其義非不昭然而或者猶以窮理之説為疑今更即孔子所以告顔子者明之夫非禮勿視非禮勿聽是雖克己之目也然以耳目之於聲色論則即格物之方也目交於色惟禮是視而非禮則勿視耳交於聲惟禮是聽而非禮則勿聽豈非格物之方乎在己言之則謂之克己在物言之則謂之格物克己則物斯格矣能格物則已斯克矣顔子其殆庶幾者也理既內明其於克己禮與非禮固不待窮理而知若夫後世學者將以格物禮與非禮茍不以窮理為先則於物之本末事之終始何自知之是必味大學知所先後之旨先窮其理孰為禮之當視當聽者孰為非禮之不當視不當聽者窮理如是而知之審矣夫然後於物交物之際用其力焉禮所當視當聽者則視之聽之禮所不當視不當聽者則勿視勿聽以己言之即克義也以物言之即格義也格物如是則目不為色所引而所視者無非正色耳不為聲所引而所聽者無非正聲自然非禮聲色不入耳目夫如是則物格矣物既格則先來窮理所謂知所先後之知斯為至矣知至而后意誠意誠而后心正心正而后身修身修而后家齊國治天下平之效於斯著矣茍其不然雖知窮理於其先既知禮之所當視當聽者矣又知非禮之所不當視不當聽者矣至於物交物之際乃不能用其力卒如孟子之言為物所引遇非禮之色交於目不能勿視遇非禮之聲交於耳不能勿聽豈所謂格物者哉格物之功既不加耳目為聲色所引必不能正其視聽欲其物格也難矣物不格則先來窮理所謂知所先後之知又安能極其至也知不至則意不誠意不誠則心不正心不正則身不修而齊家治國平天下之本於斯亂矣此致知在格物物格而后知至所以為大學之至要也知之非艱行之惟艱窮理所以知之也物格所以行之也茍知於其始而不能允蹈於終以極其知之所至豈所謂知至至之知終終之者哉其於大學之道欲其有所得也難矣昨於格物之義解之不為不詳學者猶不明窮理之義兹故復為之説而托前賢之所以論格物者終之漢末和洽有言儉素過中自以處身則可以此格物所失或多邴原性剛直清議以格物晉書之稱陸抗謂不以名位格物本朝曽南豐之論房杜謂不以己長格物明道先生答或人御吏之問謂正己以格物詳其辭意皆不以窮理為訓即此五説參之則知窮理之説乃物有本末事有終始知所先後則近道矣之旨但可以明格物之因不可以訓格物之義若以窮理訓格物謂格物即窮理則於義誠有未盡此學者所以不能無疑也與退而省其私説子與回言謂其終日不違如愚所謂不違者非謂不違夫子之言也謂回之侍夫子其心終日不違於仁爾惟其不違於仁所以如愚而實非愚也退而省其私私者非謂燕居也若以燕居言何省之云乎蓋衆人所共者為公一人所獨者為私顔子之工夫心齋也衆人所不可得而知不可得而見者也是之所謂私夫子因其退也省其謹獨工夫知其有所開明故曰亦足以發既足以發則回之不愚可知矣仁者夀説聖人之論仁者夀必先以樂山與靜言者何哉蓋體性不動生物無窮惟山為然仁者實如之仁者安仁者也故首以樂山言次之以靜終之以夀也惟其仁者夀所以詩人之論夀必以南山喻四方皆山也何獨取乎南當知南山乃二氣厚盛之地松柏之所由茂者也即南山之喻而推之則知仁者之夀也固宜或者徒見乎顔跖之仁否不同而其數乃大相反遂於仁者夀之一言不能無疑殊不知夀之在人其名雖一而人之言夀主義或殊書言五福一曰夀是之所謂夀者主于人命言也詩言樂只君子萬夀無疆是之所謂夀者主于君德言也中庸言有大德者必得其夀是之所謂夀者主于子孫言也無非言夀也而義之不同如此然則聖人以仁而論夀果何所主而言哉堯仁如天而萬世如見性仁故也當知聖人所謂仁者夀主性而言耳大哉乾元天之仁也天惟有是仁所以健而不息至哉坤元地之仁也地惟有是仁所以德合無疆天地悠久而人與之並立而為三才者天地之性人為貴也人人有是性有是仁而不知在己有天然之夀者昧乎人生而靜之理也人生而靜天之性也惟仁者能安之揚子雲論人之夀有所謂物以其性人以其仁其言蓋有見於此彼莊子之論長生有取于無搖爾精無勞爾形是亦知以靜為夀也然其立言之義主於身而不主於性若近於修養引年之説又豈若聖人之論夀一本於成性存存者乎是理也文中子亦知之其論仁者夀一言以蔽之曰其忘我之所為乎忘我之所為則性安於靜矣人惟安於性之靜而不為物所遷則知在我有生生不窮之理未嘗與天地不相似也斯其所以為仁者之夀歟嵗寒然後知松柏之後雕説夫子嘗曰天何言哉四時行焉百物生焉天何言哉夫四時之行天也而夫子獨取嵗寒言百物之生天也而夫子獨取松柏何與當知嵗寒者冬之將終春之將始乃艮之所以成終成始者也松柏者千嵗之姿百木之長乃艮之所謂為堅多節者也以艮之時言之朔風凛烈隂氣嚴凝霜增肅殺之威雪重沍寒之凍所謂嵗寒時也於斯時也非松柏不能全其操此夫子所以有取焉爾以艮之木言之盤根固地徑節參天氣隆東北之方質有庚金之性所謂松柏木也惟斯木也非嵗寒不足見其剛此夫子所以有取焉爾或者曰當餞臘賔春之際有氷清玉潔之容梅非不耐嵗寒也何獨取乎松柏曰梅之於嵗寒也止能耐於一時不能耐於春夏是何足與松柏比也或者又曰在四時長青不改柯易葉竹非不耐嵗寒也何獨取乎松柏曰竹之於嵗寒也止能耐於十數年之間不能耐於千百年之久是何足與松柏比也所以夫子有言受命於地惟松柏獨也在冬夏青青則知孤生徑特信有本而然哉雖然論語一書其所記載非仁則義也非孝則忠也而夫子於此惟以松柏言是果何義也嵗不寒無以知松柏事不難無以知君子窮而益堅老而益壯遇難而能正其志雖困不失其所亨縱至晚年尤全晚節後雕之義是之取爾然則學者聞夫子之所言欲確乎其所守果何道而能之亦不過曰盡艮之所以成始成終者耳全艮之所謂為堅多節者耳艮之取喻或為門闕或為閽寺明其有所守也艮之有守止其所也人能止其所而思不出其位則所守始終不渝斯無愧於後雕之訓苟惟時行不行時止不止乖其成始成終之大義失其為堅多節之本性則如蒲栁之質耳聖門何取焉是知逰聖人之門有願學之志者必能體兼山之象於止而知所止則其為學之效斯如松柏之茂日新而又新矣執御説逹巷黨人稱夫子曰大哉不可謂不知夫子者且言博學而無所成名是歎美夫子所學之博不可以一善稱之也唯其莫可得而名所以無所成名耳非謂惜其不成一善之名也詳其言意即夫子稱堯之大哉蕩蕩乎民無能名焉之意夫子聞其言乃謂門弟子有吾何執執御乎執射乎之語夫射御皆藝也苟可以成名無不可者夫子胡為獨以吾執御矣終之豈夫子果欲親執御以成名乎况執御一藝耳而初非成名之事也謂聖人以之而成名豈知聖人者哉當知執射則不免於放縱執御則不可以放縱聖人以執御為言蓋其心常操而存終不為名而有所放縱也觀聖人之言可以求其言外之旨哉至如夫子之論富謂富而可求也雖執鞭之士吾亦為之是明富之不可求也如不可求從吾所好以此章執御之言詳之則知夫子之所好獨在於執御厥有旨也大禹之戒曰豫臨兆民凛乎若朽索之馭六馬是即夫子執御之意也堯兢兢舜業業湯栗栗文王翼翼前聖後聖其揆一也此戒謹恐懼所以為聖人之至要歟子絶四説子絶四意必固我夫子何有哉若以毋字作無字説謂夫子絶無此四者則失一章之旨矣原思為之宰與之粟九百辭子曰毋與此章毋字義同當知此絶四蓋夫子嘗以四者戒訓弟子不可有此也四者考之於書言之者亦不一繫辭曰聖人立象以盡意大學曰欲正其心先誠其意孟子以意逆志是為得之此意之見於書者也易曰積善之家必有餘慶禮記必躬必親必誠必信論語曰齊必變食居必遷坐此必之見於書者也易曰貞固足以幹事中庸曰擇善而固執之論語與其不遜也寧固此固之見於書者也易曰我有好爵論語曰我欲仁斯仁至矣孟子曰萬物皆備於我此我之見於書者也夫四者言之於書俱若無害也然此章所記夫子之於四者俱禁止之曰毋何與蓋是之所謂意必固我違乎中道而過之也乃仁義禮智之賊也意者萌心之謂也凡事萌心而為之則不能盡誠誠不盡則自欺此仁之賊也欲成己也難矣必者致期之謂也凡事致期而為之則不能合宜宜不合則失正此義之賊也欲制事也難矣固者執一之謂也凡事執一而為之則不能中節節不中則廢權此禮之賊也欲制行也難矣我者自私之謂也凡事自私而為之則不能辨惑惑不辨則多蔽此智之賊也欲燭理也難矣惟其四者乃四端之賊故夫子皆禁止曰毋弟子從而記之曰絶毋者皆禁止之辭絶者禁止之義也四端之説或人有以辨惑為疑者殊不知公生明私生暗所謂辨惑者非謂辨人之惑也一朝之忿忘其身以及其親非惑與是辨在身之惑也智者不惑以其不自私耳此自私所以為智之賊子擊磬説子擊磬于衛荷蕢者過其門而聞之曰有心哉擊磬乎因聞磬之聲而知孔子之心不可謂不知孔子者也繼之以鄙哉硜硜乎之言非謂鄙夫子而發此言也蓋鄙時人耳硜硜非石聲也硜硜然小人哉豈石聲乎硜硜乃小石之堅者喻其難入也是鄙當時之人有言難入莫我之知斯時也可已則已矣水深則以衣而涉之所謂深則厲也水淺則攝衣而涉之所謂淺則揭也或厲或揭當顧其時可也夫子聞荷蕢之言信其言曰果哉謂誠然也末訓無之訓往嘆其時之無所往也子路曰末之也已何必公山氏之之也是知末之謂無所往也明矣惟其無所往故夫子終有難矣之嘆見得聖賢相與傷時如此其切若以為相鄙相譏則失聖賢之意矣斯己之己字先儒有以己身而言者蓋謂善其身而已夫子以己欲立而立人己欲達而達人為仁之方可謂夫子獨善其身而已哉當知斯已而已乃知夫子之道不行而勸之止耳即楚狂接輿所謂己而已而之義三變説子夏曰君子有三變所謂變者非謂有遷改也望之儼然即所謂動容貌也毋不敬之義也即之也溫即所謂正顔色也儼若思之義也聽其言也厲即所謂出辭氣也安定辭之義也變雖有三皆自一身明之初無遷改所以每變皆善即子夏所言推之在人一身又有三變者存焉一曰舉止變二曰精神變三曰心志變舉止變者必傲必忽甚則至於慢上陵下親者失其為親故者失其為故矣精神變者必昏必耄甚則至於形枯氣憊不為聲色所困必為疾病所攻矣心志變者必險必詐甚則至於損人害物非但失其本心又將殃及子孫矣是三變也皆因物而變遷致改常而莫覺所以每變皆不善有志於學者可不知所自警哉樊遲問仁孔子告以居處恭執事敬與人忠是即自警之方也居處恭則必無驕傲之過何患乎舉止之變哉執事敬則必無淫佚之過何患乎精神之變哉與人忠則必無欺偽之過何患乎心志之變哉果能此道以警夫三者之變則意誠心正身修其於君子之三變斯能無愧於子夏之言矣忠恕説忠者中心無欺所謂盡其心者也恕者即無欺之心推以及人所謂舉斯心而加諸彼而已者是也曽子則以為一貫子思則以為違道不逺何也蓋曽子之言忠恕主生而知之者言是指自誠明謂之性者言也誠者天之道也故直以一貫論聖人之道子思之言忠恕主學而知之者言是指自明誠謂之教者言也誠之者人之道也故以施諸己而不願亦勿施於人論賢人之所學先反求諸己而後及諸人於道能無違乎然而忠恕存焉此所以不逺也夫子思受道於曽子者也其論忠恕乃與曽子異者譬之伐柯然子思所伐之柯與曽子所伐之柯本無異也子思所以伐之與曽子所以伐之則異矣曽子伐柯胸中自有成柯不視其所執者為法則自然能成子思伐柯非以所執者為法則不能有成所以曽子見得夫子一貫之道忠恕而已而子思則見得曽子忠恕違道不逺也然則學者欲明忠恕之要當以曽子之言明之歟抑當以子思之言明之歟故嘗以謂曽子之言忠恕涵養工夫也子思之言忠恕踐履工夫也欲盡涵養之道者要當以一貫之旨會之於心欲求踐履之實者必當以己所不欲勿施於人者行之於己如此則合內外之道而兩無不盡斯於曽子子思之言俱無愧矣師説人之患在好為人師師者人之模範豈人之所患乎而人之所以患之者好為之過也師而好為則存於中者必有自大之心發於外者必將往教於人此其為患何可勝言是知為師之道必學識之明可以為人之師而人自然而來學則斯無患矣所以聖人論師必先言其知次言其可如論語論可以為師則先之以溫故知新學記論可以為師亦先之以知教之所由興廢夫師必貴乎先知者蓋有所知則學識眀由是以己所知而覺人所不知斯盡其善喻之道何師之不可為哉是故學記一篇始終専主知言至論能博喻然後能為師亦必以知至學之難易為本蓋以知則昭昭斯可以使人昭昭也此師道之所以貴乎知也宜乎中庸曰知所以修身則知所以治人是亦以知為貴也知所以治人則為人之師斯無愧矣噫此大學之道所以必先致其知與儒行説儒行一篇學者皆疑其非聖門之書謂為漢儒所作詳其文勢固有可疑蓋孔子對哀公之問亦當有儒行之説但不如是之鋪敘耳其間措辭立意不可謂全無聖人之語如言道塗不爭險易之利冬夏不爭隂陽之和非學識明者不能言非學力至者不能行是豈漢儒之所能言所能至哉恐出於孔門弟子之所記而漢儒從而潤色修飾之故有儒行之篇也夫當道塗之間平易之地則遜之於人艱險之地則躬自履之而不辭當冬夏之時暑則遜人以清涼之所寒則遜人以溫暖之所而身之所處則雖寒暑有所不避推其所為謂非儒者之行可乎且以近世為儒者論之其在文闈也孰不欲己得而人失其在仕路也孰不欲己髙而人下凡於利害之中能處之以不爭而無愧於儒行之所言者幾何人哉即此兩語明其不爭之義則知儒行之言皆儒者終身踐履之法讀之者固不可以為漢儒之言而不加意也五福六極説五福言富不言貴説者以為富則貴在其中夫有財者富有爵者貴謂富即貴不可也然則五福不言貴豈謂貴不可以言福哉蓋洪範之於貴以有德為福不以有爵為福也雖有人爵之貴茍天爵之不修則雖貴不可保安可言福當知二曰富之後宜以貴繼之不繼之以貴而四曰攸好德者是言所好者德則貴斯可保此其所以為福也故知箕子之於五福不以貴言而惟以攸好德言蓋眀攸好德則貴在其中矣六極言貧不言賤説者以為貧則賤在其中夫無財者貧無爵者賤謂貧即賤不可也然則六極不言賤豈謂賤不可以言極哉蓋洪範之於賤以無德為極不以無爵為極也人雖無人爵之貴茍天爵之不棄則雖賤不能移安可言極當知四曰貧之下宜以賤次之不次之以賤而五曰惡者是言惡則所好者非德而賤必至於移此其所以為極也故知箕子之於六極不以賤言而惟以惡言蓋明惡則賤在其中矣三復箕子之論福極貴者可以謂之福而不以貴言福必以攸好德為福賤者可以謂之極而不以賤言極必以惡為極是欲貴者不以貴而驕奢賤者不以賤而暴棄也然則處貴與賤者觀箕子之言其於福善禍淫之道可不知所戒哉可不知所謹哉種德説種德之旨發於大禹之論臯陶必以邁為言者蓋種德之在人稟受於天昭明於心踐履於身此乃根本在此惟其根本在此故以種之為貴種也者講學以耨之如農夫之殖苖日新日益所以熟夫仁也不種則生意不續不續則不可久逺而所謂根本者斯如朽木之不可雕也種則繫辭所言生生之謂易詩之所言實函斯活者於是乎發見與天地同流宜乎大禹以邁之一字推明其義也武王知此亦曰植德務滋植德即種德義務滋即邁義中庸論夀斷之以子孫保之之辭由家而論必其乃祖乃父種之於先若子若孫種之於後續續不已斯可以夀言之夀則邁與滋之義咸在其中矣即一中庸之言取詩中所言維天之命於穆不已論文王之德之純純亦不已是發明至誠無息之理也惟至誠無息自然不已非有所勉而然也易言天地之道久而不已與此不已同義若夫義有不可巳必待勉而不已者乃學者進德之功也如顔子以能問於不能以多問於寡孔子以為吾見其進此知其不可已自勉而不己者也所以未見其止無愧於不己之義如冉子非不説子之道力不足也孔子以為今女畫是於其不可已不能自勉而終己之者也所以中道而廢其於不己之義終不能無愧焉夫冉子之不己較之顔子之不已所學固有淺深原本缺用其心而不己者則冉子之己是亦自原本缺逮耳未為得罪於名教者也何以言之蓋不己有二義有為善而不己者有為利而不己者雞鳴而起孶孶為善此不己於善者也所以為舜之徒雞鳴而起孶孶為利此不己於利者也所以為跖之徒人而為跖之徒是為名教之罪人矣於此而不知戒聖人之所深憂也故孔子曰老之時血氣既衰戒之在得是戒其為利而不己也當蒼頭白髮之餘而貪多務得之念不息勞其筋力瘁其體膚耗其精神一不暇顧其所以家傳者守為世寶自然流芳綿逺豈非積善之家必有餘慶者哉種德喻種麻得麻種豆得豆顧其所種者種上聲如何耳惟其種有不同故人之種之近取諸身逺取諸物亦不能無異也有種而求穫者有種而不求穫者求穫者為利也不求穫者為善也由是而推則知朝種暮穫市人之種也時種嵗穫農夫之種也所以種者皆為利非種德之謂也若夫以時而種久不求穫此聖賢之種也所以種者本為善初無利心焉斯可謂之種德矣理一説理在天下一而已矣理之所以一者根於心也由其心而推之何適而非理哉統於心而無不善之謂性動於中而有所欲之為情萌於心而有所為之謂意存於心而有所慕之謂志凝於心而有所想之謂思想於心而有所懷之謂念念於心而有所謀之謂慮公於心而有所覺之謂仁行於心而無不當之謂義别於心而有所節之謂禮明於心而有所見之謂智究於心而無不孚之謂信得於心而無所歉之謂德運於心而無不通之謂道立於心而無所倚之謂中發於心而無所戾之謂和盡於心而無或欺之謂忠推於心而無不容之謂恕一於心而無不敬之謂誠妙於心而不可測之謂神神於心而有所變之謂易無非心也無非理也人人有是心具是理而不能無智愚賢不肖之殊者學與不學之分耳學則有以用其心不學則心無所用此人所以不可不學也學明則心明心明則理明理明則會其有極歸其有極而繫辭之所謂一致論語之所謂一貫孟子之所謂一揆自然默而成之不言而信矣然則膺千里牧民之任誠體此以承流宣化而邦民有不被其澤哉天理人欲説天理人欲説者多分而言之謂天理為善人欲為不善殊不知天理初不外乎人欲而人欲中固未嘗無天理也使夫人之所欲與天理相違謂為不善可也若其所欲與天理相合其可以為不善哉當知人欲之與天理合之則一而公公則無不善也違之則二而私私則斯為不善矣所以孔子有言我欲仁斯仁至而孟子亦言可欲之為善曰仁曰可無非本天理言之所欲如是謂之不善可乎而説者多以不善言欲者蓋以欲之在人所不能無而人之所欲常患其縱縱則違乎天理故孔子發明從心之旨復有所欲不踰矩之訓而孟子推明養心之要又有寡欲之説皆所以戒其縱也易損卦之象不言無欲惟言窒欲此其旨也故嘗以謂有無心之欲有有心之欲無心之欲不能無有心之欲不可有記言感於物而動性之欲也此無心之欲也在人豈能無哉語言棖也欲焉得剛則有心之欲也在人豈可有哉詩於隰有萇楚序言思無情欲夫詩之所謂情欲者欲之私也惟其私欲不可有故以思無言人如有此則滅天理窮人欲矣滅天理蔽夫天理而無所明者也窮人欲縱乎人欲而至於極者也天理不滅則人欲不窮故欲其天理之明者必當以情欲為戒能無情欲則天理自明何滅之云天理既明則人欲不縱何窮之云夫如是則天理人欲合而為一於道斯為得矣孟子曰仁者人也合而言之道也其斯之謂歟
