body:
  text: 提要凖齋雜説二卷儒家類臣等謹案凖齋雜説二卷宋吳如愚撰如愚字子發錢塘人少以父任補承信郎監福州連江商稅再調常熟解職歸嘉熈二年以丞相喬行簡奏薦換授承信郎差充秘閣校勘三疏辭免特轉秉義郎與祠其仕履見於館閣續録及趙希弁讀書附志而宋史不為立𫝊故行實不槩見今考徐元杰楳埜集有所作如愚行状臚載事蹟極詳大畧言如愚孝友忠恕安貧樂道理明行修凡所著述於學問自得甚深别有易詩書説大學中庸論孟及隂符經解諸種並佚不𫝊此書亦久無行世之本獨散見永樂大典中者尚得四十餘篇大抵皆研究理學之文元杰又稱如愚早年留心清净之教凡三四年既而幡然盡棄所學刻意講道是如愚學術其初亦稍涉於禪悦其解大學格物以正為訓明王守仁𫝊習録所謂格物如孟子格君心之格其説實創於如愚似欲毅然獨行一家之言者然如愚平日嘗稱塞乎天地者皆實理行乎萬世者皆實用惟盡心知性則實理融而實用貫其用功致力實以體用兼備為主而不墜於虚無故扵剖晰義理如天理人欲之辨三畏四力之論無不發揮深至扵宋末諸儒中所造較為平實元杰又言永嘉陳昉親炙不倦得所著述退輙録之刻為一編臨川羅愚復刋于廣右漕臺所𫝊益廣盖是編即昉所輯久經刋布在當時甚重其書今檢行状載如愚别有踐形踐迹諸説已不在永樂大典中則所録亦不免闕佚然崖畧具存謹編次成帙釐為二卷猶可考見其槩焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ce26d2d2152767d6b811878e50510a52f7a8216569ffef30871b57ef6f1fb3ea
